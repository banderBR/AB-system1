<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AB OS | نظام الإدارة السحابي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #00ff88; --bg: #0a0a0a; --card: #151515; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { background: var(--bg); color: white; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }
        .container { background: var(--card); padding: 30px; border-radius: 20px; box-shadow: 0 0 30px rgba(0,255,136,0.1); width: 90%; max-width: 500px; text-align: center; border: 1px solid #333; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #333; background: #222; color: white; font-size: 16px; outline: none; text-align: center; }
        button { width: 100%; padding: 12px; border-radius: 10px; border: none; background: var(--p); color: black; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 16px; margin-top: 10px; }
        button:hover { opacity: 0.8; transform: scale(1.02); }
        .member-card { background: #222; padding: 15px; border-radius: 10px; margin-top: 10px; border-right: 4px solid var(--p); text-align: right; position: relative; }
        .warning-count { color: #ff4444; font-weight: bold; }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--p); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loading" class="loading-overlay"><div class="loader"></div></div>

<div class="container" id="app">
    <h2 id="title">نظام AB OS السحابي</h2>
    <div id="login-zone">
        <input type="password" id="passInput" placeholder="أدخل كود الدخول">
        <button onclick="login()">دخول</button>
    </div>

    <div id="main-zone" style="display:none;">
        <div id="admin-controls" style="display:none;">
            <h3>لوحة المدير</h3>
            <input type="text" id="newName" placeholder="اسم العضو">
            <input type="text" id="newRole" placeholder="الرتبة">
            <input type="text" id="newCode" placeholder="كود العضو الخاص">
            <button onclick="addMember()">إضافة عضو جديد</button>
            <hr style="border:0.5px solid #333; margin:20px 0;">
        </div>
        <div id="members-list"></div>
        <button onclick="location.reload()" style="background:#444; color:white;">تسجيل خروج</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzVJB2OkxbZgfls2wYSAGoYeWLv1gtho5cg7AXIdG4yMbZqud6UbtOKZvAfcxpCDCT4iQ/exec";
    let currentUser = null;
    let allData = [];

    async function loadData() {
        showLoading(true);
        try {
            const res = await fetch(SCRIPT_URL);
            allData = await res.json();
            renderMembers();
        } catch (e) { console.error("Error loading", e); }
        showLoading(false);
    }

    function renderMembers() {
        const list = document.getElementById('members-list');
        list.innerHTML = "";
        allData.forEach((m, index) => {
            if (currentUser === 'admin' || m.code === document.getElementById('passInput').value) {
                const div = document.createElement('div');
                div.className = 'member-card';
                div.innerHTML = `
                    <strong>${m.name}</strong> (${m.role})<br>
                    المهام: ${m.tasks || 'لا يوجد'}<br>
                    التحذيرات: <span class="warning-count">${m.warnings || 0}</span>
                    ${currentUser === 'admin' ? `
                        <div style="margin-top:10px;">
                            <button onclick="updateMember(${index}, 'warning')" style="width:auto; padding:5px 10px; background:#ff4444;">+ تحذير</button>
                            <button onclick="editTasks(${index})" style="width:auto; padding:5px 10px; background:#444;">تعديل المهام</button>
                        </div>
                    ` : ''}
                `;
                list.appendChild(div);
            }
        });
    }

    async function login() {
        const code = document.getElementById('passInput').value;
        if (code === "777") {
            currentUser = 'admin';
            document.getElementById('admin-controls').style.display = 'block';
        } else {
            await loadData();
            const user = allData.find(u => u.code === code);
            if (user) { currentUser = 'user'; } 
            else { alert("الكود خطأ!"); return; }
        }
        document.getElementById('login-zone').style.display = 'none';
        document.getElementById('main-zone').style.display = 'block';
        if(currentUser === 'admin') loadData();
    }

    async function addMember() {
        const name = document.getElementById('newName').value;
        const role = document.getElementById('newRole').value;
        const code = document.getElementById('newCode').value;
        if(!name || !code) return alert("اكمل البيانات");

        showLoading(true);
        await fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify({ action: "add", name, role, code })
        });
        document.getElementById('newName').value = "";
        document.getElementById('newRole').value = "";
        document.getElementById('newCode').value = "";
        await loadData();
    }

    async function updateMember(index, type) {
        showLoading(true);
        const member = allData[index];
        await fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify({ action: "update", name: member.name, type: type })
        });
        await loadData();
    }

    async function editTasks(index) {
        const newTask = prompt("أدخل المهام الجديدة:");
        if (newTask === null) return;
        showLoading(true);
        await fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify({ action: "update", name: allData[index].name, type: 'tasks', value: newTask })
        });
        await loadData();
    }

    function showLoading(show) {
        document.getElementById('loading').style.display = show ? 'flex' : 'none';
    }
</script>

</body>
</html>
